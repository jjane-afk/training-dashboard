<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Station Dashboard</title>
</head>
<body>
    <header class="main-header">Training Stations
    <img src="Logo.png" alt="Logo" class="header-logo">
    </header>
    <div class="training-card">
       <h3>Food Safety Checklist</h3>
    <button class="view-btn" onclick="togglePDF('Food-Safety.pdf')">View Checklist</button>
    <div class="pdf-container" id="Food-Safety.pdf"></div>
  </div>

        <div class="training-card yellow"><h3>Backroom Preparation Checklist</h3><a href="Backroom-Preparation.pdf" target="_blank" type="application/pdf" width="100%" height="600px">Open Checklist</a>
        <div class="card orange"><h3>Hospitality</h3><a href="#">Open Checklist</a></div>
        <div class="card orange"><h3>Customer Service</h3><a href="#">Open Checklist</a></div>
        <div class="card red"><h3>Safety & Security</h3><a href="#">Open Checklist</a></div>
        <div class="card yellow"><h3>Personal Hygiene</h3><a href="#">Open Checklist</a></div>
    </div>
<!-- JS for toggling PDF -->
  <script>
    function togglePDF(filename) {
      const container = document.getElementById(filename);

      // Embed PDF if not already embedded
      if (container.innerHTML === "") {
        container.innerHTML = `
          <div style="text-align:right;">
            <button class="close-btn" onclick="closePDF('${filename}')">Close PDF</button>
          </div>
          <iframe src="${filename}" width="100%" height="500px" style="border:none;"></iframe>
        `;
      }

      // Toggle display
      container.style.display = container.style.display === "none" ? "block" : "none";
    }

    function closePDF(filename) {
      const container = document.getElementById(filename);
      container.style.display = "none";
    }
  </script>

</body>
</html>
